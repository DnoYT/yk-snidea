<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline' var(--vscode-font-family); script-src 'unsafe-inline' https://code.iconify.design; connect-src https://api.iconify.design;" />
    <title>Prompt Builder</title>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
      body { padding: 15px 10px; color: var(--vscode-editor-foreground); font-family: var(--vscode-font-family); background-color: var(--vscode-sideBar-background); }
      .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
      label { font-size: 12px; font-weight: 600; color: var(--vscode-sideBarTitle-foreground); }
      input, select { width: 100%; box-sizing: border-box; padding: 6px; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); border-radius: 2px; outline: none; }
      .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
      button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; border: none; cursor: pointer; background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
      .btn-secondary { background: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground); }
      #result-area { min-height: 200px; width: 100%; box-sizing: border-box; padding: 6px; background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); font-family: var(--vscode-editor-font-family); border: 1px solid var(--vscode-input-border); resize: vertical; outline: none; white-space: pre-wrap;}

      /* --- 顶部全局 Tag 样式 --- */
      .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 5px; }
      .file-tag { display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--vscode-badge-background); color: var(--vscode-badge-foreground); border-radius: 4px; font-size: 11px; }
      .tag-name { cursor: pointer; display: flex; align-items: center; gap: 4px; }
      .tag-name:hover { text-decoration: underline; }
      .remove-icon { cursor: pointer; opacity: 0.7; margin-left: 4px; }
      .remove-icon:hover { opacity: 1; color: #ef4444; }

      /* --- 下拉列表样式 --- */
      .editor-wrapper { position: relative; width: 100%; }
      .dropdown-list { display: none; position: absolute; bottom: 100%; left: 0; right: 0; max-height: 150px; overflow-y: auto; background: var(--vscode-dropdown-background); border: 1px solid var(--vscode-dropdown-border); border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000; margin-bottom: 4px; padding: 0; list-style: none; }
      .dropdown-list.active { display: block; }
      .dropdown-item { padding: 6px 10px; cursor: pointer; display: flex; flex-direction: column; color: var(--vscode-dropdown-foreground); font-size: 12px; }
      .dropdown-item:hover { background: var(--vscode-list-hoverBackground); }
      .dropdown-item .file-name { font-weight: bold; }
      .dropdown-item .file-path { opacity: 0.6; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* --- 富文本输入框与行内 Tag 样式 --- */
      #requirement {
          width: 100%; min-height: 80px; box-sizing: border-box; padding: 6px;
          background: var(--vscode-input-background); color: var(--vscode-input-foreground);
          border: 1px solid var(--vscode-input-border); border-radius: 2px;
          outline: none; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
      }
      #requirement:empty:before {
          content: attr(data-placeholder);
          color: var(--vscode-input-placeholderForeground);
          pointer-events: none;
      }
      /* 行内块级 Tag：通过 contenteditable="false" 实现一键删除 */
      .inline-file-tag {
          display: inline-flex; align-items: center; gap: 4px;
          padding: 2px 6px; margin: 0 2px;
          background: var(--vscode-badge-background); color: var(--vscode-badge-foreground);
          border-radius: 4px; font-size: 11px; vertical-align: middle;
          user-select: all; /* 允许作为一个整体被选中和删除 */
      }
      .dropdown-item.highlight { 
          background: var(--vscode-list-activeSelectionBackground); 
          color: var(--vscode-list-activeSelectionForeground); 
      }
    </style>
  </head>
  <body>
    <div class="form-group">
      <label>技能与角色</label>
      <select id="skills">
        <option value="前端开发专家">前端开发专家</option>
        <option value="后端开发专家">后端开发专家</option>
      </select>
    </div>
    <div class="form-group">
      <label>开发规范</label>
      <select id="rules">
        <option value="默认通用规范">默认规范 (无 else 规范)</option>
      </select>
    </div>
    <div class="form-group">
      <label>数据库参考</label>
      <input type="text" id="db-info" placeholder="例如: user_table" />
    </div>

    <div class="form-group">
      <label>本次开发需求 (输入 @ 搜索并引入文件)</label>
      <div id="selected-files" class="tags-container"></div>
      
      <div class="editor-wrapper">
        <ul id="file-dropdown" class="dropdown-list"></ul>
        <div id="requirement" contenteditable="true" data-placeholder="描述需求，输入 @ 文件名..."></div>
      </div>
    </div>

    <div class="btn-group">
      <button id="btn-generate">
        <span class="iconify" data-icon="carbon:magic-wand"></span>生成提示词
      </button>
    </div>
    <div class="form-group">
      <textarea id="result-area" readonly placeholder="点击上方按钮生成..."></textarea>
    </div>
    <div class="btn-group">
      <button class="btn-secondary" id="btn-copy">一键复制</button>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      let selectedFilesList = [];
      let currentSearchKeyword = null;

      const requirementInput = document.getElementById('requirement');
      const dropdown = document.getElementById('file-dropdown');
      const tagsContainer = document.getElementById('selected-files');

      /**
       * 渲染顶部的全局文件 Tags
       */
      const renderTags = () => {
          // 生成原生 HTML 字符串
          let htmlContent = '';
          selectedFilesList.forEach((file, index) => {
              const fileName = file.relativePath.split('/').pop();
              const sameNameFiles = selectedFilesList.filter(f => f.relativePath.split('/').pop() === fileName);
              
              let displayName = fileName;
              if (sameNameFiles.length > 1) {
                  const parts = file.relativePath.split('/');
                  if (parts.length > 1) displayName = `${parts[parts.length - 2]}/${fileName}`;
              }

              htmlContent += `
                  <div class="file-tag" title="${file.relativePath}">
                      <span class="tag-name" data-index="${index}">
                          <span class="iconify" data-icon="carbon:document"></span> ${displayName}
                      </span>
                      <span class="iconify remove-icon" data-icon="carbon:close" data-index="${index}"></span>
                  </div>
              `;
          });

          tagsContainer.innerHTML = htmlContent;

          // 【核心修复】：动态注入的 HTML 必须手动触发 Iconify 扫描，否则图标出不来，按钮也没法点
          if (window.Iconify) {
              window.Iconify.scan(tagsContainer);
          }

          // 绑定点击打开文件事件
          document.querySelectorAll('.tag-name').forEach(el => {
              el.addEventListener('click', (e) => {
                  const idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                  vscode.postMessage({ type: 'openFile', path: selectedFilesList[idx].fsPath });
              });
          });

          // 绑定点击删除事件
          document.querySelectorAll('.remove-icon').forEach(el => {
              el.addEventListener('click', (e) => {
                  e.stopPropagation();
                  const idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                  selectedFilesList.splice(idx, 1);
                  renderTags();
              });
          });
      };

   

      let activeDropdownIndex = -1;

      /**
       * 更新下拉列表的高亮状态，并确保选中项滚动到可视区域内
       * @param {NodeListOf<Element>} items - 下拉项的 DOM 节点列表
       */
      const updateDropdownHighlight = (items) => {
          items.forEach((item, index) => {
              item.classList.remove('highlight');
              if (index === activeDropdownIndex) {
                  item.classList.add('highlight');
                  // 原生 API：平滑滚动到当前选中项
                  item.scrollIntoView({ block: 'nearest' });
              }
          });
      };

      /** 隐藏下拉列表，重置键盘索引 */
      const hideDropdown = () => {
          dropdown.classList.remove('active');
          dropdown.innerHTML = '';
          currentSearchKeyword = null;
          activeDropdownIndex = -1;
      };

     /**
       * 新增核心逻辑：监听键盘按键 (上下键、回车、Tab)
       */
      requirementInput.addEventListener('keydown', (e) => {
          // 提前返回：下拉框没出来时，不干预任何按键
          if (!dropdown.classList.contains('active')) {
              return;
          }

          const items = dropdown.querySelectorAll('.dropdown-item');
          if (items.length === 0) {
              return;
          }

          // 处理向下方向键
          if (e.key === 'ArrowDown') {
              e.preventDefault(); // 阻止光标在输入框内移动
              activeDropdownIndex = (activeDropdownIndex + 1) % items.length;
              updateDropdownHighlight(items);
              return;
          }

          // 处理向上方向键
          if (e.key === 'ArrowUp') {
              e.preventDefault();
              // 加上 items.length 避免出现负数索引
              activeDropdownIndex = (activeDropdownIndex - 1 + items.length) % items.length;
              updateDropdownHighlight(items);
              return;
          }

          // 处理确认键 (Enter 或 Tab)
          if (e.key === 'Enter' || e.key === 'Tab') {
              e.preventDefault();
              if (activeDropdownIndex >= 0 && activeDropdownIndex < items.length) {
                  // 触发对应项的点击事件，复用之前写好的插入逻辑
                  items[activeDropdownIndex].click();
              }
              return;
          }
      });

      /** 监听富文本框输入事件，触发搜索 */
      requirementInput.addEventListener('input', () => {
          const selection = window.getSelection();
          if (!selection.rangeCount) return;

          const range = selection.getRangeAt(0);
          const textNode = range.startContainer;
          
          if (textNode.nodeType !== Node.TEXT_NODE) {
              hideDropdown();
              return;
          }

          const text = textNode.textContent.slice(0, range.startOffset);
          const match = text.match(/@([^\s]*)$/);

          if (!match) {
              hideDropdown();
              return;
          }

          currentSearchKeyword = match[1];
          vscode.postMessage({ type: 'searchFiles', keyword: currentSearchKeyword });
      });

      /** 监听来自后端的消息 */
      window.addEventListener("message", (event) => {
          const message = event.data;
          
          if (message.type === "renderResult") {
              document.getElementById("result-area").value = message.value;
              return;
          }

          if (message.type === "searchResults") {
              if (currentSearchKeyword === null) return;

              const files = message.files;
              dropdown.innerHTML = '';

              if (files.length === 0) {
                  dropdown.innerHTML = '<li class="dropdown-item">未找到文件...</li>';
                  dropdown.classList.add('active');
                  return;
              }

              files.forEach((file, index) => {
                  const li = document.createElement('li');
                  li.className = 'dropdown-item';
                  li.innerHTML = `<span class="file-name">${file.relativePath.split('/').pop()}</span><span class="file-path">${file.relativePath}</span>`;
                  
                  li.addEventListener('click', () => {
                      const isExist = selectedFilesList.some(f => f.fsPath === file.fsPath);
                      if (!isExist) {
                          selectedFilesList.push(file);
                          renderTags();
                      }
                      // 调用你之前的 insertInlineTagAtCursor 逻辑
                      insertInlineTagAtCursor(file);
                      hideDropdown();
                  });
                  dropdown.appendChild(li);
              });
              
              dropdown.classList.add('active');
              
              // 每次搜索结果刷新后，默认高亮第一项
              activeDropdownIndex = 0;
              const items = dropdown.querySelectorAll('.dropdown-item');
              updateDropdownHighlight(items);
              
              return;
          }
      });

      /**
       * 核心逻辑：使用 Range API 在光标处插入不可编辑的内联 Tag
       * @param {Object} file 文件信息对象
       */
      const insertInlineTagAtCursor = (file) => {
          const selection = window.getSelection();
          if (!selection.rangeCount) return;

          const range = selection.getRangeAt(0);
          const textNode = range.startContainer;
          
          if (textNode.nodeType !== Node.TEXT_NODE) return;

          const text = textNode.textContent;
          const textBeforeCursor = text.slice(0, range.startOffset);
          const atIndex = textBeforeCursor.lastIndexOf('@');
          
          if (atIndex === -1) return;

          // 1. 删除输入框里的 @xxx 纯文本
          range.setStart(textNode, atIndex);
          range.setEnd(textNode, range.startOffset);
          range.deleteContents();

          // 2. 创建一个 contenteditable="false" 的块级标签
          const fileName = file.relativePath.split('/').pop();
          const tagSpan = document.createElement('span');
          tagSpan.className = 'inline-file-tag';
          tagSpan.contentEditable = 'false'; // 这一句是让 Backspace 能一键删除整个 Tag 的灵魂！
          tagSpan.innerHTML = `<span class="iconify" data-icon="carbon:document"></span> ${fileName}`;
          
          // 3. 将标签插入到光标位置
          range.insertNode(tagSpan);

          // 4. 在标签后面插入一个空格，方便用户继续打字
          const spaceNode = document.createTextNode('\u00A0');
          tagSpan.parentNode.insertBefore(spaceNode, tagSpan.nextSibling);

          // 5. 将光标移动到空格后面
          range.setStartAfter(spaceNode);
          range.setEndAfter(spaceNode);
          selection.removeAllRanges();
          selection.addRange(range);

          // 渲染新插入的图标
          if (window.Iconify) {
              window.Iconify.scan(tagSpan);
          }
      };

      window.addEventListener("message", (event) => {
          const message = event.data;
          
          if (message.type === "renderResult") {
              document.getElementById("result-area").value = message.value;
              return;
          }

          if (message.type === "searchResults") {
              if (currentSearchKeyword === null) return;

              const files = message.files;
              dropdown.innerHTML = '';

              if (files.length === 0) {
                  dropdown.innerHTML = '<li class="dropdown-item">未找到文件...</li>';
                  dropdown.classList.add('active');
                  return;
              }

              files.forEach(file => {
                  const li = document.createElement('li');
                  li.className = 'dropdown-item';
                  li.innerHTML = `<span class="file-name">${file.relativePath.split('/').pop()}</span><span class="file-path">${file.relativePath}</span>`;
                  
                  li.addEventListener('click', () => {
                      // 1. 将文件加入全局列表（去重）
                      const isExist = selectedFilesList.some(f => f.fsPath === file.fsPath);
                      if (!isExist) {
                          selectedFilesList.push(file);
                          renderTags();
                      }

                      // 2. 在光标处渲染视觉 Tag
                      insertInlineTagAtCursor(file);
                      hideDropdown();
                  });
                  dropdown.appendChild(li);
              });
              dropdown.classList.add('active');
              return;
          }
      });

      document.getElementById("btn-generate").addEventListener("click", () => {
          const filePaths = selectedFilesList.map(f => f.fsPath);
          const data = {
              skills: document.getElementById("skills").value,
              rules: document.getElementById("rules").value,
              dbInfo: document.getElementById("db-info").value,
              files: filePaths, // 传递数组给后端
              // innerText 会自动把 DOM 结构转换为清晰的纯文本，极其适合富文本取值
              requirement: document.getElementById("requirement").innerText, 
          };
          vscode.postMessage({ type: "generate", data: data });
      });

      document.getElementById("btn-copy").addEventListener("click", async () => {
          const resultText = document.getElementById("result-area").value;
          if (!resultText) return;
          try {
              await navigator.clipboard.writeText(resultText);
              vscode.postMessage({ type: "info", value: "复制成功！" });
          } catch (err) {
              vscode.postMessage({ type: "error", value: "复制失败" });
          }
      });
    </script>
  </body>
</html>
